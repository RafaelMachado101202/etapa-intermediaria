<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoPonto Inteligente</title>
    <style>
        :root {
            --primary: #2e7d32;
            --secondary: #4caf50;
            --bg: #f1f8e9;
            --text: #1b5e20;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        header {
            text-align: center;
            border-bottom: 2px solid var(--bg);
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        .stats-card {
            background: var(--primary);
            color: white;
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }

        .stat-item { text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: bold; display: block; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--secondary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background-color: var(--primary); }

        .hint {
            font-size: 0.85rem;
            background: #e8f5e9;
            padding: 10px;
            border-left: 4px solid var(--primary);
            margin: 15px 0;
        }

        table {
            width: 100%;
            margin-top: 25px;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th, td {
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th { background: #f9f9f9; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🌿 EcoPonto</h1>
        <p>Transforme descarte em consciência</p>
    </header>

    <div class="stats-card">
        <div class="stat-item">
            <span class="stat-value" id="display-pontos">0.0</span>
            <span>Pontos</span>
        </div>
        <div class="stat-item">
            <span class="stat-value" id="display-nivel">🌱 Iniciante</span>
            <span>Nível</span>
        </div>
    </div>

    <div class="form-group">
        <label>Material</label>
        <select id="select-material" onchange="atualizarDica()">
            <option value="Plástico" data-pts="10" data-dica="Lave para remover resíduos orgânicos.">🥤 Plástico</option>
            <option value="Papel" data-pts="5" data-dica="Não pode estar sujo de gordura.">📄 Papel</option>
            <option value="Vidro" data-pts="15" data-dica="Embale se estiver quebrado.">🍾 Vidro</option>
            <option value="Metal" data-pts="12" data-dica="Amasse as latas.">🥫 Metal</option>
            <option value="Eletrônico" data-pts="50" data-dica="Nunca descarte no lixo comum.">💻 Eletrônico</option>
            <option value="Óleo" data-pts="40" data-dica="Armazene em garrafas PET.">🛢️ Óleo</option>
        </select>
    </div>

    <div class="form-group">
        <label>Peso (kg)</label>
        <input type="number" id="input-peso" step="0.1" min="0.1" value="1.0">
    </div>

    <div class="form-group">
        <label>CEP da Coleta</label>
        <input type="text" id="input-cep" placeholder="00000-000" onblur="buscarCEP()">
        <small id="localizacao-info" style="display: block; margin-top: 5px;"></small>
    </div>

    <div class="hint" id="dica-texto">💡 Dica: Lave para remover resíduos orgânicos.</div>

    <button onclick="registrarDescarte()">Registrar Descarte</button>

    <h3>📜 Histórico Recente</h3>
    <table id="tabela-historico">
        <thead>
            <tr>
                <th>Data</th>
                <th>Material</th>
                <th>Peso</th>
                <th>Local</th> <th>Pontos</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>
    let dados = {
        total_pontos: 0,
        historico: []
    };

    // Carregar dados salvos no navegador (LocalStorage)
    function carregarDados() {
        const salvo = localStorage.getItem('ecoponto_dados');
        if (salvo) {
            dados = JSON.parse(salvo);
            atualizarInterface();
        }
    }

    function salvarDados() {
        localStorage.setItem('ecoponto_dados', JSON.stringify(dados));
    }

    function calcularNivel(pts) {
        if (pts < 100) return "🌱 Iniciante";
        if (pts < 500) return "🌿 Consciente";
        if (pts < 1000) return "🌳 Sustentável";
        return "🌎 Guardião do Planeta";
    }

    function atualizarDica() {
        const select = document.getElementById('select-material');
        const dica = select.options[select.selectedIndex].getAttribute('data-dica');
        document.getElementById('dica-texto').innerText = "💡 Dica: " + dica;
    }

    // NOVA FUNÇÃO DA API
    async function buscarCEP() {
        const cep = document.getElementById('input-cep').value.replace(/\D/g, '');
        const info = document.getElementById('localizacao-info');
        
        if (cep.length === 8) {
            try {
                info.innerText = "Buscando...";
                const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
                const data = await response.json();
                
                if (!data.erro) {
                    info.innerText = `📍 ${data.localidade} - ${data.uf}`;
                    info.style.color = "green";
                    return `${data.localidade}/${data.uf}`;
                } else {
                    info.innerText = "❌ CEP não encontrado.";
                    info.style.color = "red";
                }
            } catch (error) {
                info.innerText = "❌ Erro ao conectar na API.";
            }
        }
        return null;
    }

    async function registrarDescarte() {
    const select = document.getElementById('select-material');
    const peso = parseFloat(document.getElementById('input-peso').value);
    const fator = parseFloat(select.options[select.selectedIndex].getAttribute('data-pts'));
    const material = select.value;
    
    // Captura o texto que a API do CEP escreveu no ecrã
    const localInfo = document.getElementById('localizacao-info').innerText;
    
    // Se o texto estiver vazio ou for o padrão, define como "Não informado"
    const localFinal = (localInfo && localInfo.includes("📍")) ? localInfo : "Não informado";

    if (isNaN(peso) || peso <= 0) {
        alert("Por favor, insira um peso válido.");
        return;
    }

    const pontosGanhos = peso * fator;
    dados.total_pontos += pontosGanhos;

    const novoRegistro = {
        data: new Date().toLocaleDateString('pt-BR'),
        material: material,
        peso: peso.toFixed(1) + "kg",
        pontos: pontosGanhos.toFixed(1),
        local: localFinal // Aqui garantimos que não seja undefined
    };

    dados.historico.unshift(novoRegistro);
    if (dados.historico.length > 5) dados.historico.pop();

    salvarDados();
    atualizarInterface();
    alert(`Sucesso! +${pontosGanhos.toFixed(1)} pontos.`);
    }

    function registrarDescarte() {
        const select = document.getElementById('select-material');
        const peso = parseFloat(document.getElementById('input-peso').value);
        const fator = parseFloat(select.options[select.selectedIndex].getAttribute('data-pts'));
        const material = select.value;

        if (isNaN(peso) || peso <= 0) {
            alert("Por favor, insira um peso válido.");
            return;
        }

        const pontosGanhos = peso * fator;
        dados.total_pontos += pontosGanhos;

        const novoRegistro = {
            data: new Date().toLocaleDateString('pt-BR'),
            material: material,
            peso: peso.toFixed(1) + "kg",
            pontos: pontosGanhos.toFixed(1)
        };

        dados.historico.unshift(novoRegistro); // Adiciona no início
        if (dados.historico.length > 5) dados.historico.pop(); // Mantém apenas os 5 últimos

        salvarDados();
        atualizarInterface();
        alert(`Sucesso! +${pontosGanhos.toFixed(1)} pontos.`);
    }

    function atualizarInterface() {
        document.getElementById('display-pontos').innerText = dados.total_pontos.toFixed(1);
        document.getElementById('display-nivel').innerText = calcularNivel(dados.total_pontos);

        const tbody = document.querySelector('#tabela-historico tbody');
        tbody.innerHTML = "";
        
        dados.historico.forEach(item => {
            const row = `<tr>
                <td>${item.data}</td>
                <td>${item.material}</td>
                <td>${item.peso}</td>
                <td>${item.local}</td> <td>${item.pontos}</td>
            </tr>`;
            tbody.innerHTML += row;
        });
    }

    // Inicializar
    carregarDados();
</script>

</body>
</html>
